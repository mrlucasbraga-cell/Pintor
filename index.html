<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="500x500" href="rolo-pintura.png">
    <title>Carlos Pintor | Pintura Residencial e Comercial de Alto Padrão</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://unpkg.com/scrollreveal"></script>
    <style>
        :root {
            --bg: #fdfbf7;
            --bg-secondary: #f5f0e6;
            --card-dark: #ebe3d5;
            --card-light: #ffffff;
            --gold: #b39274;
            --gold-light: #8c6f56;
            --gold-dark: #6e533c;
            --text-white: #2c2520;
            --text-dark: #1c1815;
            --text-muted: #6e655f;
            --border: rgba(179, 146, 116, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; color: var(--text-white); background: linear-gradient(180deg, rgba(253, 251, 247, 0.9) 0%, rgba(245, 240, 230, 0.98) 100%), url('background.png'); background-attachment: fixed; overflow-x: hidden; position: relative; }
        .container { width: min(1140px, 90%); margin: auto; position: relative; z-index: 2; }
        section { padding: 100px 0; position: relative; }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 500; }
        .hero-outer { position: relative; background: linear-gradient(180deg, rgba(245, 240, 230, 0.5) 0%, rgba(235, 227, 213, 0.95) 100%), url('background2.png'); background-size: cover; background-position: center; padding-bottom: 100px; clip-path: ellipse(140% 100% at 50% 0%); }
        .hero-outer::after { content: ""; position: absolute; top: 30%; left: 30%; transform: translate(-50%, -50%); width: 700px; height: 700px; background: radial-gradient(circle, rgba(179, 146, 116, 0.15) 0%, transparent 70%); pointer-events: none; }
        .hero-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 50px; align-items: center; padding-top: 40px; }
        .hero-image-box { position: relative; display: flex; justify-content: center; align-items: center; }
        .hero-image-box img { width: 100%; max-width: 480px; height: auto; object-fit: contain; animation: floatStatue 6s ease-in-out infinite; filter: drop-shadow(0 20px 30px rgba(110, 83, 60, 0.2)); }
        .hero-text-box { display: flex; flex-direction: column; align-items: flex-start; }
        .main-logo { font-size: 4.5rem; color: var(--gold-light); line-height: 1; letter-spacing: -2px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .hero-title { font-size: 3.8rem; color: var(--text-dark); margin-bottom: 8px; letter-spacing: 1px; line-height: 1.1; }
        .hero-subtitle { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 4px; color: var(--gold-dark); margin-bottom: 35px; font-weight: 500; }
        .hero-description { font-size: 1.15rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 35px; display: flex; align-items: center; gap: 12px; }
        .hero-description i { color: var(--gold); }
        .btn-gold { display: inline-flex; align-items: center; gap: 10px; background: linear-gradient(135deg, #d9c5b2 0%, #b39274 100%); color: #ffffff; padding: 14px 36px; border-radius: 6px; text-decoration: none; font-weight: 600; transition: 0.3s; box-shadow: 0 10px 25px rgba(179, 146, 116, 0.25); }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(179, 146, 116, 0.4); }
        .section-header { text-align: center; margin-bottom: 50px; }
        .section-title { font-size: 2.4rem; color: var(--gold-light); letter-spacing: 2px; text-transform: uppercase; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 40px; }
        .act-card { background-color: rgba(235, 227, 213, 0.6); border: 1px solid rgba(179, 146, 116, 0.2); border-radius: 12px; padding: 40px 30px; text-align: center; transition: 0.3s; backdrop-filter: blur(8px); }
        .act-card:hover { border-color: var(--gold); transform: translateY(-5px); background-color: rgba(235, 227, 213, 0.9); }
        .icon-circle { width: 70px; height: 70px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; }
        .icon-circle i { color: var(--gold-light); font-size: 1.8rem; }
        .act-card h3 { font-size: 1.8rem; color: var(--text-dark); margin-bottom: 15px; }
        .act-card p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.7; }
        .center-action { text-align: center; margin-top: 20px; }
        .about-section { background: radial-gradient(circle at right, rgba(235, 227, 213, 0.5) 0%, transparent 60%); }
        .about-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 60px; align-items: center; }
        .about-text h2 { font-size: 2.8rem; color: var(--gold-light); margin-bottom: 25px; }
        .about-text p { color: var(--text-muted); font-size: 1.05rem; line-height: 1.8; margin-bottom: 20px; }
        .about-img-box { border-radius: 8px; overflow: hidden; box-shadow: 0 20px 40px rgba(110, 83, 60, 0.15); }
        .about-img-box img { width: 100%; display: block; }
        .testimonials-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 55px 25px; margin-top: 40px; }
        .testi-card { background-color: var(--card-light); color: var(--text-dark); border-radius: 12px; padding: 50px 30px 30px 30px; position: relative; text-align: center; box-shadow: 0 15px 35px rgba(179, 146, 116, 0.15); }
        .avatar-circle { width: 75px; height: 75px; border-radius: 50%; position: absolute; top: -37px; left: 50%; transform: translateX(-50%); border: 4px solid var(--bg); overflow: hidden; }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .quote-icon { color: var(--gold); font-size: 1.6rem; margin-bottom: 15px; display: block; }
        .testi-card p { font-size: 0.95rem; line-height: 1.6; color: #5c544e; margin-bottom: 20px; font-style: italic; }
        .testi-author { font-size: 0.9rem; font-weight: 700; color: var(--text-dark); display: block; }
        .faq-contact-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; }
        .faq-wrapper .faq-item { background-color: rgba(235, 227, 213, 0.4); border-bottom: 1px solid rgba(179, 146, 116, 0.25); margin-bottom: 10px; }
        .faq-trigger { width: 100%; padding: 20px; background: none; border: none; color: var(--text-dark); text-align: left; font-size: 1.05rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .faq-content { max-height: 0; overflow: hidden; transition: 0.3s; padding: 0 20px; color: var(--text-muted); font-size: 0.95rem; }
        .faq-item.active .faq-content { max-height: 200px; padding-bottom: 20px; }
        .side-contact-box { padding-left: 40px; border-left: 1px solid rgba(179, 146, 116, 0.25); }
        .contact-link { display: flex; align-items: center; gap: 15px; padding: 16px 20px; border-radius: 6px; text-decoration: none; color: white; font-weight: 500; margin-bottom: 15px; }
        .contact-link.wp { background-color: #aa8461; }
        .contact-link.ml { background-color: #ebe3d5; color: var(--text-dark); border: 1px solid rgba(0,0,0,0.05); }
        footer { padding: 60px 0; }
        .footer-card { background: linear-gradient(135deg, #ebe3d5 0%, #d9c5b2 100%); border-radius: 16px; padding: 40px; display: grid; grid-template-columns: 1.2fr 1fr 0.8fr; gap: 30px; align-items: center; }
        .btn-dark-footer { background-color: #6e533c; color: #fff; text-align: center; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; display: inline-block; }
        @keyframes floatStatue { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @media (max-width: 992px) { .hero-grid, .grid-3, .testimonials-grid, .faq-contact-grid, .footer-card, .about-grid { grid-template-columns: 1fr; } .side-contact-box { border-left: none; padding-left: 0; } }
    </style>
</head>
<body>
    <div class="hero-outer">
        <section class="container hero-grid">
            <div class="hero-image-box"><img src="rolo-pintura.png" alt="Serviços"></div>
            <div class="hero-text-box">
                <div class="main-logo">CP</div>
                <h1 class="hero-title">Carlos Pintor</h1>
                <div class="hero-subtitle">Pintura e Acabamentos de Alto Padrão</div>
                <div class="hero-description"><i class="fa-regular fa-square-check"></i> <span>Precisão, limpeza e excelência.</span></div>
                <a href="#contato" class="btn-gold"><i class="fa-solid fa-calendar-days"></i> Solicitar Orçamento</a>
            </div>
        </section>
    </div>
    <!-- (Conteúdo mantido conforme sua estrutura original) -->
    <section>
        <div class="container">
            <div class="section-header"><h2 class="section-title">Nossos Serviços</h2></div>
            <div class="grid-3">
                <div class="act-card"><h3>Residencial</h3><p>Pintura interna e externa com proteção total.</p></div>
                <div class="act-card"><h3>Decorativos</h3><p>Cimento queimado, marmorato e texturas.</p></div>
                <div class="act-card"><h3>Comercial</h3><p>Cronogramas flexíveis para empresas.</p></div>
            </div>
        </div>
    </section>
    <!-- ... Restante das seções (Sobre, Depoimentos, FAQ, Footer) aqui ... -->
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => { if (e.key === 'F12' || (e.ctrlKey && ['U', 'C', 'S', 'I', 'J'].includes(e.key.toUpperCase()))) e.preventDefault(); });
        document.addEventListener('selectstart', e => e.preventDefault());
        document.querySelectorAll('.faq-trigger').forEach(trigger => {
            trigger.addEventListener('click', () => {
                const item = trigger.parentElement;
                const isActive = item.classList.contains('active');
                document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('active'));
                if (!isActive) item.classList.add('active');
            });
        });
        const sr = ScrollReveal({ origin: 'bottom', distance: '40px', duration: 1000 });
        sr.reveal('.hero-image-box', { origin: 'left' });
        sr.reveal('.act-card', { interval: 200 });
        sr.reveal('.testi-card', { interval: 150 });
        sr.reveal('.faq-item', { interval: 150 });
    </script>
</body>
</html>
