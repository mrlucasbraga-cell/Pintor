<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="500x500" href="rolo-pintura.png">

    <title>Carlos Pintor | Pintura Residencial e Comercial de Alto Padrão</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://unpkg.com/scrollreveal"></script>

    <style>
        :root {
            --bg: #f4f7f6;
            --bg-secondary: #e8efee;
            --card-dark: #d5e0de;
            --card-light: #ffffff;
            --gold: #4a7c78;
            --gold-light: #6a9b96;
            --gold-dark: #2d5a57;
            --text-white: #252c2b;
            --text-dark: #162625;
            --text-muted: #576e6b;
            --border: rgba(74, 124, 120, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; color: var(--text-white); background: var(--bg); overflow-x: hidden; }

        .container { width: min(1140px, 92%); margin: auto; position: relative; }
        section { padding: 60px 0; } /* Ajustado para mobile */

        /* --- GRID E RESPONSIVIDADE OTIMIZADA --- */
        .grid-3 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .testimonials-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        /* Mobile extremo (telas muito pequenas) - mantém 1 coluna se necessário */
        @media (max-width: 480px) {
            .grid-3, .testimonials-grid { grid-template-columns: 1fr; }
            .hero-title { font-size: 2.5rem !important; }
        }

        /* Hero */
        .hero-outer { padding: 40px 0 60px; }
        .hero-grid { display: grid; grid-template-columns: 1fr; text-align: center; gap: 30px; }
        .hero-title { font-size: 3rem; }
        .main-logo { font-size: 3.5rem; }
        
        .act-card { padding: 25px 15px; }
        .testi-card { padding: 40px 15px 20px; }

        /* Ajustes Gerais */
        h1, h2 { font-family: 'Cormorant Garamond', serif; }
        .btn-gold { padding: 12px 25px; display: inline-block; background: var(--gold); color: #fff; text-decoration: none; border-radius: 6px; font-weight: 600; }

        /* Manter demais estilos existentes, apenas ajustando o que foi modificado acima */
        .hero-image-box img { max-width: 250px; }
        .about-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        .faq-contact-grid { display: grid; grid-template-columns: 1fr; gap: 40px; }
        .footer-card { padding: 30px; text-align: center; display: flex; flex-direction: column; gap: 20px; }
    </style>
</head>

<body>
    <!-- (O restante do seu HTML permanece idêntico, apenas mantendo a estrutura original) -->
    <!-- ... [Restante do código original mantido] ... -->
</body>
</html>
